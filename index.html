/* Dark overlay — bottom heavy so logo is clear */
.hero::before{
  content:"";position:absolute;inset:0;z-index:0;
  background:
    linear-gradient(to bottom,
      rgba(14,46,28,0.45) 0%,
      rgba(14,46,28,0.52) 30%,
      rgba(10,22,16,0.82) 68%,
      rgba(6,13,8,0.97) 100%
    );
}

/* Gold glow behind logo */
.hero::after{
  content:"";position:absolute;bottom:60px;left:50%;transform:translateX(-50%);
  width:300px;height:200px;z-index:0;
  background:radial-gradient(ellipse,rgba(201,168,76,0.08) 0%,transparent 70%);
}

.logo-wrap{position:relative;z-index:1;text-align:center;}
.logo-img{width:190px;height:auto;filter:drop-shadow(0 4px 24px rgba(0,0,0,0.5));}
.slogan{
  position:relative;z-index:1;
  font-family:"Fraunces",serif;font-style:italic;font-weight:300;
  font-size:15px;color:rgba(245,240,230,0.5);
  letter-spacing:1.5px;margin-top:12px;text-align:center;
}

/* BOTTOM SECTION */
.bottom{
  background:#060D08;
  padding:28px 18px 40px;
  display:flex;flex-direction:column;align-items:center;gap:0;
  max-width:440px;margin:0 auto;width:100%;
}

/* RULE */
.rule{display:flex;align-items:center;gap:14px;width:100%;margin-bottom:24px;}
.rule-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.18),transparent);}
.rule-dot{width:3px;height:3px;background:rgba(201,168,76,0.4);border-radius:50%;}

/* ACTIONS */
.actions{width:100%;display:flex;flex-direction:column;gap:10px;}

/* PRIMARY MENU */
.btn-menu{
  display:flex;align-items:center;gap:18px;
  width:100%;height:84px;padding:0 22px;
  background:linear-gradient(135deg,#141F15,#0E1A10);
  border:1px solid rgba(201,168,76,0.35);
  border-radius:16px;
  cursor:pointer;text-decoration:none;position:relative;overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,0.5),0 0 0 0 rgba(201,168,76,0);
  transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.2s,border-color 0.2s;
}
.btn-menu::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,0.06),transparent 60%);pointer-events:none;}
.btn-menu:hover{transform:translateY(-2px);box-shadow:0 14px 48px rgba(0,0,0,0.6),0 0 20px rgba(201,168,76,0.07);border-color:rgba(201,168,76,0.5);}
.btn-menu:active{transform:scale(0.98);}

.menu-icon-wrap{width:48px;height:48px;border-radius:12px;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.18);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.menu-text{flex:1;}
.menu-title{font-family:"Fraunces",serif;font-weight:400;font-size:22px;color:var(--c);line-height:1;margin-bottom:4px;}
.menu-sub{font-size:10px;font-weight:400;letter-spacing:2px;text-transform:uppercase;color:rgba(245,240,230,0.35);}
.menu-arr{font-size:20px;color:rgba(201,168,76,0.35);flex-shrink:0;}

/* SECONDARY ROW */
.row{display:flex;gap:10px;width:100%;}

.btn-wa,.btn-club{
  flex:1;display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-end;
  height:108px;padding:16px 16px;border:none;border-radius:16px;
  cursor:pointer;text-decoration:none;position:relative;overflow:hidden;
  transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.2s;
}

.btn-wa{
  background:linear-gradient(145deg,#0D2114,#081510);
  border:1px solid rgba(37,211,102,0.14);
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
}
.btn-wa::before{content:"";position:absolute;top:-20px;right:-20px;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,rgba(37,211,102,0.09),transparent 70%);}
.btn-wa:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,0.55);}
.btn-wa:active{transform:scale(0.97);}

.btn-club{
  background:linear-gradient(145deg,#162814,#0C1E0E);
  border:1px solid rgba(201,168,76,0.18);
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
}
.btn-club::before{content:"";position:absolute;top:-20px;right:-20px;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,0.1),transparent 70%);}
.btn-club:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,0.55),0 0 20px rgba(201,168,76,0.06);}
.btn-club:active{transform:scale(0.97);}

.wa-icon{margin-bottom:8px;}
.wa-title{font-family:"Fraunces",serif;font-weight:400;font-size:17px;color:#6ee7a0;line-height:1;margin-bottom:3px;}
.wa-sub{font-size:9px;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;color:rgba(110,231,160,0.4);}

.flame-wrap{margin-bottom:8px;}
.club-title{font-family:"Fraunces",serif;font-weight:400;font-size:17px;color:var(--g);line-height:1;margin-bottom:3px;}
.club-sub{font-size:9px;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;color:rgba(201,168,76,0.45);}
.club-new{position:absolute;top:9px;right:11px;background:var(--g);color:var(--e);font-size:7px;font-weight:500;letter-spacing:2px;text-transform:uppercase;padding:2px 7px;border-radius:20px;}

/* FOOTER */
.footer{width:100%;text-align:center;margin-top:28px;padding:0 10px;}
.f-hours{font-family:"Fraunces",serif;font-style:italic;font-weight:300;font-size:14px;color:rgba(245,240,230,0.38);margin-bottom:10px;letter-spacing:0.5px;}
.f-address{font-size:9.5px;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;color:rgba(245,240,230,0.2);line-height:2;margin-bottom:14px;}
.f-ig{display:inline-flex;align-items:center;gap:6px;color:rgba(245,240,230,0.22);font-size:9.5px;font-weight:400;letter-spacing:2px;text-transform:uppercase;text-decoration:none;transition:color 0.2s;}
.f-ig:hover{color:var(--g);}

/* ANIMATIONS */
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
.logo-wrap{animation:up 0.9s cubic-bezier(0.16,1,0.3,1) both;}
